<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Car Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🔥 Preload Font -->
    <link rel="preload" href="/assets/fonts/carfont.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="manifest" href="manifest.json">

    <style>
        /* 🔥 Optimized Font Loading */
        @font-face {
            font-family: 'CarFont';
            src: url('/assets/fonts/carfont.eot');
            src: url('/assets/fonts/carfont.eot?#iefix') format('embedded-opentype'),
                url('/assets/fonts/carfont.woff2') format('woff2'),
                url('/assets/fonts/carfont.woff') format('woff'),
                url('/assets/fonts/carfont.ttf') format('truetype');

            font-weight: normal;
            font-style: normal;

            font-display: swap;
            /* prevents invisible text */
            unicode-range: U+000-5FF;
            /* Latin subset */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'CarFont', Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: #e5e7eb;
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(148, 163, 184, 0.3);
        }

        header h1 {
            font-size: 24px;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.03em;
        }

        nav a:hover {
            color: #00adb5;
        }

        .hero {
            min-height: 70vh;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(15, 23, 42, 0.85)),
                url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }

        .hero-content h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero-content p {
            max-width: 600px;
            margin: 0 auto 20px auto;
            color: #cbd5f5;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        section {
            padding: 40px 0;
        }

        .blog-posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #020617;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.8);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 18px;
        }

        .btn {
            display: inline-block;
            margin-top: 14px;
            padding: 8px 14px;
            background: #00adb5;
            color: white;
            text-decoration: none;
            border-radius: 999px;
            font-size: 13px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            color: #9ca3af;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>🚗 Car Blog</h1>
        <nav>
            <a href="#hero">Home</a>
            <a href="#about">About</a>
            <a href="#types">Types</a>
            <a href="#features">Features</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h2>Explore the Future of Cars</h2>
            <p>Electric, hybrid, and performance cars insights.</p>
        </div>
    </section>

    <div class="container">

        <div class="blog-posts">

            <!-- 🔥 Lazy Loading Images -->
            <div class="card">
                <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" loading="lazy" width="300"
                    height="200">
                <div class="card-content">
                    <h3>Electric Cars</h3>
                    <p>Future of EVs</p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" loading="lazy" width="300"
                    height="200">
                <div class="card-content">
                    <h3>Supercars</h3>
                    <p>Speed & luxury</p>
                </div>
            </div>

        </div>

    </div>

    <footer>
        <p>© 2026 Car Blog</p>
    </footer>

    <!-- 🔥 Optimized JS -->
    <script defer>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/service-worker.js");
            });
        }
    </script>

</body>

</html>
