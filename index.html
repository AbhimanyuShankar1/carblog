<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Car Blog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 🚀 Performance -->
    <meta name="theme-color" content="#00adb5">
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://images.unsplash.com">

    <!-- 🔥 Font Preload -->
    <link rel="preload" href="/assets/fonts/carfont.woff2" as="font" type="font/woff2" crossorigin>

    <link rel="manifest" href="manifest.json">

    <style>
        /* 🔥 Optimized Font */
        @font-face {
            font-family: 'CarFont';
            src: url('/assets/fonts/carfont.eot');
            src: url('/assets/fonts/carfont.eot?#iefix') format('embedded-opentype'),
                url('/assets/fonts/carfont.woff2') format('woff2'),
                url('/assets/fonts/carfont.woff') format('woff'),
                url('/assets/fonts/carfont.ttf') format('truetype');

            font-display: swap;
            unicode-range: U+000-5FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'CarFont', system-ui, Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: #e5e7eb;
            line-height: 1.6;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .hero {
            min-height: 70vh;
            background: linear-gradient(135deg, rgba(15, 23, 42, .95), rgba(15, 23, 42, .85)),
                url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 40px 20px;
        }

        section {
            padding: 40px 0;
            content-visibility: auto;
            /* 🔥 */
        }

        .blog-posts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #020617;
            border-radius: 10px;
            overflow: hidden;
            transition: transform .3s;
            will-change: transform;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #020617;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h1>🚗 Car Blog</h1>
        <nav>
            <a href="#hero">Home</a>
            <a href="#about">About</a>
            <a href="#types">Types</a>
            <a href="#features">Features</a>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h2>Explore the Future of Cars</h2>
            <p>Electric, hybrid, and performance cars insights.</p>
        </div>
    </section>

    <div class="container">

        <section>
            <div class="blog-posts">

                <!-- 🔥 Optimized Images -->
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1549924231-f129b911e442" loading="lazy" decoding="async"
                        width="300" height="200">
                    <div class="card-content">
                        <h3>Electric Cars</h3>
                    </div>
                </div>

                <div class="card">
                    <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a" loading="lazy"
                        decoding="async" width="300" height="200">
                    <div class="card-content">
                        <h3>Supercars</h3>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <footer>
        <p>© 2026 Car Blog</p>
    </footer>

   
    

</body>

</html>
